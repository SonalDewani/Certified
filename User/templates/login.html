{% extends 'auth_base.html' %}

{% block content %}

<div class="login-wrapper">
    <div class="login-card">

        <h2>Login</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit">Login</button>
        </form>

    </div>
</div>

{% endblock %}
